name: Feature request
description: Propose a new router, gate, archetype, digest improvement, or eval case
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What gap are you trying to close?
      description: Explain the missing behavior or missing coverage.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Be concrete about which file or behavior should change.
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Primary category
      options:
        - Global market router
        - Sector router
        - Commercial evidence gate
        - Capacity-state gate
        - Valuation hard gate
        - Technical structure (§9)
        - Archetype (new or modified)
        - Angle library or digest
        - Eval case
        - README or contributor docs
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Describe the exact pass condition.
      placeholder: "New case should block valuation when ..."
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Backward compatibility
      description: Does this change break any existing eval cases or make the skill looser?
      placeholder: "No existing cases affected / Case X needs update because ..."
