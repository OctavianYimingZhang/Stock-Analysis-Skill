version: 1
defaults:
  archetypes:
    - mature
    - frontier
    - turnaround
    - consumer_health_platform
    - b2b_software_platform
    - digital_bank_or_lender
    - lending_marketplace
    - provider_reimbursement
    - resource_policy
    - industry_chain_context
  contract_form_taxonomy:
    - mou
    - pilot
    - framework
    - commercial_agreement
    - binding_po
    - backlog
    - recognized_revenue
  capacity_status_taxonomy:
    - planned
    - ordered
    - under_construction
    - mechanically_complete
    - ramping
    - operational
  monetization_taxonomy:
    - uncontracted
    - partially_contracted
    - contracted
  study_standard_taxonomy:
    - ni43_101
    - sk1300
    - jorc
    - pea
    - pfs
    - fs
    - aace_class4
    - company_presentation
  qualification_status_taxonomy:
    - sample_sent
    - under_certification
    - qualified
    - purchase_agreement
    - recurring_revenue
  inventory_realization_status_taxonomy:
    - produced_unsold
    - contracted_unsold
    - mark_to_market_only
  revenue_type_taxonomy:
    - value_creating
    - pass_through
    - agency
    - mixed
  required_sections_by_archetype:
    mature: [business_logic, operating_metrics, customers_channels, orders_backlog, capital_structure, financial_quality, valuation, risks]
    frontier: [certification_status, commercialization_gates, cash_runway, dilution_ladder, partner_quality, financial_quality]
    turnaround: [maturity_wall, refi_path, interest_burden, covenant_headroom, asset_sale_dependency, financial_quality]
    consumer_health_platform: [product_concentration, retention_cross_sell, marketing_efficiency, regulatory_distribution_risk, fulfillment_margin, financial_quality]
    b2b_software_platform: [customer_concentration, nrr_or_expansion, sbc_and_true_fcf, legal_accounting_quality, data_privacy, financial_quality]
    digital_bank_or_lender: [funding_stack, asset_liability_sensitivity, credit_quality, capital_ratios, regulatory_status, financial_quality]
    lending_marketplace: [funding_stack, partner_funding_quality, credit_quality, securitization_dependence, take_rate_or_fee_model, financial_quality]
    provider_reimbursement: [site_or_facility_economics, reimbursement_mechanics, collections_quality, policy_sensitivity, payer_or_idr_dependency, financial_quality]
    resource_policy: [permit_path, offtake, realized_pricing, processing_capacity, working_capital, financial_quality]
    industry_chain_context: [supply_demand_balance, bottleneck_map, policy_catalysts, company_bridge, no_valuation]
  valuation_gates:
    - default_cap_structure
    - no_unverified_denominator
    - no_terminal_target_price
  red_flags:
    - technical_analysis_in_fundamental_body
    - self_media
    - discord_youtube
    - stop_loss_language
    - uncited_numbers
  technical_context:
    default_behavior: append_section_9
    skip_when:
      - industry_chain_context
      - pre_ipo
      - spac_without_de_spac
    methodology_layers:
      - murphy_trend_structure
      - wyckoff_volume_price
      - nison_candlestick
